<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Petits Plats</title>
  <meta name="description" content="Cherchez parmi plus de 1500 recettes du quotidien, simples et délicieuses.">
  <!-- Favico -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="manifest" href="site.webmanifest">
  <!-- CSS -->
  <link rel="stylesheet" href="public/style.css">
  <!-- JS -->
  <script type="module" src="js/main.js" defer></script>
</head>

<body>
  <!-- Skip links -->
  <ul class="skip-links">
    <li><a class="skip-link" href="#content">Aller au contenu principal</a></li>
    <li><a class="skip-link" href="#search-input">Allez à la recherche</a></li>
  </ul>

  <header class="site-header">
    <a href="/" class="site-header__logo">
      <img class="site-header__logo-img" src="/assets/images/logo.svg" width="207" height="26"
        alt="Logo Les Petits Plats">
    </a>

    <div class="site-header__content">
      <h1 class="site-header__title">Cherchez parmi plus de 1500 recettes du quotidien, simples et délicieuses.</h1>

      <!-- Search form -->
      <form class="search-form js-search-form" id="search"
        aria-label="rechercher une recette, un ingredient, un ustensils, un appareil.">
        <label class="search-form__label" for="search-input">Rechercher une recette</label>
        <input class="search-form__input js-search-input" type="search" id="search-input"
          placeholder="Rechercher une recette, un ingrédient, ...">
        <button class="search-form__button" type="submit" aria-label="Lancer la recherche">
          <svg width="28" height="29" viewBox="0 0 28 29" fill="none" xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true">
            <circle cx="10" cy="10.4219" r="9.5" stroke="currentColor" />
            <line x1="18.3536" y1="19.0683" x2="27.3536" y2="28.0683" stroke="currentColor" />
          </svg>
        </button>
      </form>
    </div>
  </header>

  <main class="site-content" id="content">

    <!-- Recipes filters -->
    <aside class="filters">
      <h2 class="sr-only">Filtrer les recettes</h2>
      <div class="filter">
        <button class="filter__trigger">Ingrédients</button>
        <div class="filter__content">
          <input type="search">
          <div class="filter__options">
            <label class="filter__option" for="ingredient-1">
              <input type="checkbox" id="ingredient-1">
              <span>Lait de coco</span>
            </label>
            <label class="filter__option" for="ingredient-2">
              <input type="checkbox" id="ingredient-2">
              <span>Crème de coco</span>
            </label>
          </div>
        </div>
      </div>
      <div class="filter">
        <button class="filter__trigger">Appareils</button>
        <div class="filter__content">
          <input type="search">
        </div>
      </div>
      <div class="filter">
        <button class="filter__trigger">Ustensils</button>
        <div class="filter__content">
          <input type="search">
        </div>
      </div>
      <div class="count js-recipes-counter"></div>
    </aside>

    <!-- Recipes list -->
    <section class="recipes">
      <h2 class="sr-only">Les recettes</h2>
      <!-- Here injected recipes -->
      <div class="recipes-list | js-recipes-container"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p class="site-footer__text">© 2023 Les Petits Plats, OpenClassrooms project — Tous droits réservés.</p>
  </footer>
</body>

</html>
